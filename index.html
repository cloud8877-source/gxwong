    /* Testimonial Stack Styles */
    .testimonials-stack {
      position: relative;
      width: 100%;
      max-width: 600px;
      min-height: 420px;
      margin: 2rem auto;
      perspective: 1200px;
    }
    .testimonial-card {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      border-radius: 1rem;
      transition: transform 0.6s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.6s cubic-bezier(0.25, 1, 0.5, 1);
      cursor: grab;
    }
    .testimonial-card.is-dragging {
        transition: none;
    }
    .testimonial-card:active {
        cursor: grabbing;
    }
    .pagination {
        position: absolute;
        bottom: -2.5rem;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 0.5rem;
        z-index: 999;
    }
    .pagination-dot {
        width: 10px;
        height: 10px;
        border-radius: 99px;
        background-color: #475569; /* slate-600 */
        transition: all 0.3s;
        cursor: pointer;
        border: none;
    }
    .pagination-dot.active {
        background-color: #f59e0b; /* amber-500 */
        width: 24px;
    }
    /* Bubble animation for new contact form */
    @keyframes bubble {
        0% {
            transform: translateY(0) scale(0.5);
            opacity: 0;
        }
        50% {
            opacity: 1;
        }
        100% {
            transform: translateY(-100vh) scale(1.2);
            opacity: 0;
        }
    }
    .animate-bubble {
        animation-name: bubble;
        animation-timing-function: ease-in-out;
        animation-iteration-count: infinite;
        animation-fill-mode: forwards;
    }
